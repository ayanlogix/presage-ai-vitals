<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presage AI | Vitals Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0f; --accent: #ff3e3e; --text: #fff; --panel: #11111a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .camera-feed { background: #000; border: 2px solid #333; border-radius: 24px; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .vitals-panel { background: var(--panel); border: 1px solid #222; border-radius: 24px; padding: 30px; }
        .vitals-stat { margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #222; }
        .vitals-label { font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .vitals-value { font-size: 2.5rem; font-weight: 800; color: var(--accent); }
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(255, 62, 62, 0.5); top: 0; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .ui-overlay { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 50px; font-size: 0.8rem; border: 1px solid rgba(255,62,62,0.3); }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 40px; font-size: 2.5rem;">PRESAGE <span style="color: var(--accent);">AI VITALS</span></h1>
    <div class="grid">
        <div class="camera-feed">
            <div class="scan-line"></div>
            <div class="ui-overlay">🔴 LIVE AI ANALYSIS ACTIVE</div>
            <div style="text-align: center; color: #333;">
                <div style="font-size: 5rem;">👤</div>
                <p>Simulated Camera Feed</p>
            </div>
        </div>
        <div class="vitals-panel">
            <div class="vitals-stat">
                <div class="vitals-label">Heart Rate (BPM)</div>
                <div class="vitals-value" id="hr">72</div>
            </div>
            <div class="vitals-stat">
                <div class="vitals-label">Stress Level</div>
                <div class="vitals-value" style="color: #ffb100;" id="stress">LOW</div>
            </div>
            <div class="vitals-stat" style="border: none;">
                <div class="vitals-label">Oxygen (SpO2)</div>
                <div class="vitals-value" style="color: #00d2ff;">98%</div>
            </div>
            <p style="font-size: 0.75rem; color: #444; margin-top: 20px;">Powered by Presage SDK Integration Mockup</p>
        </div>
    </div>
    <script>
        setInterval(() => {
            document.getElementById('hr').innerText = Math.floor(Math.random() * (78 - 70) + 70);
            const levels = ["LOW", "STABLE", "MINIMAL"];
            document.getElementById('stress').innerText = levels[Math.floor(Math.random() * levels.length)];
        }, 2000);
    </script>
</body>
</html>
